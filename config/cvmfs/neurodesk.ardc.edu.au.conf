# Static default CVMFS configuration, baked into the image.
# At container startup, cvmfs_server_select.sh overwrites this with a server
# list ranked by measured download throughput; this file only serves mounts
# that happen before the selection ran (or environments where it never runs,
# e.g. CI hosts that copy it directly).
# Keep in sync with FALLBACK_SERVER_URL in config/jupyter/cvmfs_server_select.sh.
CVMFS_USE_GEOAPI=yes
CVMFS_SERVER_URL="http://cvmfs-geoproximity.neurodesk.org/cvmfs/@fqrn@;http://cvmfs.neurodesk.org/cvmfs/@fqrn@;http://s1brisbane-cvmfs.openhtc.io/cvmfs/@fqrn@;http://s1nikhef-cvmfs.openhtc.io/cvmfs/@fqrn@"
CVMFS_KEYS_DIR="/etc/cvmfs/keys/ardc.edu.au/"
