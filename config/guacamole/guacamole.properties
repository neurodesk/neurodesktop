# Build-time default properties. The live copy is seeded by init_secrets.sh
# into $GUACAMOLE_HOME (= $HOME/.neurodesk/guacamole) and points at the
# per-user user-mapping.xml there. This file remains as the fallback used when
# Tomcat picks up /etc/guacamole at build time (tests, direct dev runs).
user-mapping: /etc/guacamole/user-mapping.xml
guacd-hostname: 127.0.0.1
guacd-port: 4822
