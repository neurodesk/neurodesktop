name: Build neurodesktop-dev

# Scheduled production builds at 17:00 UTC every day.
# Build manually from here: https://github.com/NeuroDesk/neurodesktop/actions/workflows/build-neurodesktop.yml

# DockerHub: https://hub.docker.com/r/vnmd/neurodesktop
# Github Packages: https://github.com/NeuroDesk/neurodesktop/pkgs/container/neurodesktop%2Fneurodesktop

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force push?"
        type: boolean
        required: true
        default: false
  # schedule:
  #   - cron:  '0 17 * * *'

env:
  DOCKERHUB_ORG: ${{ vars.DOCKERHUB_ORG }}

jobs:
  build-image:
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch github api rate limit
        run: |
          GITHUB_RATE_REMAINING=$(curl -H "Accept: application/vnd.github.v3+json" https://api.github.com/rate_limit | jq '.rate.remaining')
          echo "GITHUB_RATE_REMAINING=${GITHUB_RATE_REMAINING}"
          echo "GITHUB_RATE_REMAINING=$GITHUB_RATE_REMAINING" >> $GITHUB_ENV
      - name: Configure runner
        run: |
          sudo mkdir -p /mnt/tmp
          sudo chown $USER /mnt/tmp
          sudo mkdir -p /mnt/docker
          echo '{"data-root": "/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Checkout repository
        if: ${{ env.GITHUB_RATE_REMAINING > 0 }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.ref }}
      - name: Set environment variables
        if: ${{ env.GITHUB_RATE_REMAINING > 0 }}
        run: |
          IMAGENAME="neurodesktop-dev"
          BUILDDATE=`date +%Y-%m-%d-%H%M`
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY/$IMAGENAME
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')

          echo "BUILDDATE=$BUILDDATE"
          echo "IMAGEID=$IMAGEID"
          echo "IMAGENAME=$IMAGENAME"

          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_ENV
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2
      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get rootfs of cached image
        run: |
          docker pull $IMAGEID:latest && ROOTFS_CACHE=$(docker inspect --format='{{.RootFS}}' $IMAGEID:latest) && docker rmi $IMAGEID:latest || true
          echo "ROOTFS_CACHE=$ROOTFS_CACHE" >> $GITHUB_ENV
      - name: Build new image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          load: true
          tags: ${{ env.IMAGEID }}:${{ env.BUILDDATE }}
          cache-from: type=registry,ref=${{ env.IMAGEID }}:latest
          cache-to: type=inline
      - name: Get rootfs of new image
        run: |
          ROOTFS_NEW=$(docker inspect --format='{{.RootFS}}' $IMAGEID:$BUILDDATE)
          PUSH_IMAGES="${IMAGEID}"
          if [ ! -z "${DOCKERHUB_ORG}" ]; then
            PUSH_IMAGES="${PUSH_IMAGES}, ${DOCKERHUB_ORG}/${IMAGENAME}"
          fi
          echo "PUSH_IMAGES=$PUSH_IMAGES"
          echo "ROOTFS_NEW=$ROOTFS_NEW" >> $GITHUB_ENV
          echo "PUSH_IMAGES=$PUSH_IMAGES" >> $GITHUB_ENV
      - name: Login to DockerHub (if changes found)
        if: ${{ env.DOCKERHUB_ORG != '' && (env.ROOTFS_NEW != env.ROOTFS_CACHE || github.event.inputs.force_push == 'true') }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Get new image metadata (if changes found)
        if: ${{ env.ROOTFS_NEW != env.ROOTFS_CACHE || github.event.inputs.force_push == 'true' }}
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804
        with:
          images: ${{ env.PUSH_IMAGES }}
          tags: |
            ${{ env.BUILDDATE }}
            latest
          labels: |
            org.opencontainers.image.description=Neurodesktop
      - name: Push new image (if changes found)
        if: ${{ env.ROOTFS_NEW != env.ROOTFS_CACHE || github.event.inputs.force_push == 'true' }}
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          # platforms: linux/amd64
          platforms: linux/amd64,linux/arm64
          provenance: false # fixes unknown/unknown arch builds
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGEID }}:latest
          cache-to: type=inline
      - name: Write image publish summary
        run: |
          if [ "${{ env.ROOTFS_NEW != env.ROOTFS_CACHE || github.event.inputs.force_push == 'true' }}" = "true" ]; then
            if [ "${{ env.DOCKERHUB_ORG }}" = "" ]; then
              RESULT="Built and pushed to GHCR."
            else
              RESULT="Built and pushed to GHCR and DockerHub."
            fi
          else
            RESULT="Image contents did not change; registry push was skipped."
          fi

          {
            echo "## Image publish summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Result | ${RESULT} |"
            echo "| Version | \`${{ env.BUILDDATE }}\` |"
            echo "| Source commit | \`${GITHUB_SHA}\` |"
            echo "| GHCR image | \`${{ env.IMAGEID }}:${{ env.BUILDDATE }}\`, \`${{ env.IMAGEID }}:latest\` |"
            if [ "${{ env.DOCKERHUB_ORG }}" != "" ]; then
              echo "| DockerHub image | \`${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}\`, \`${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:latest\` |"
            else
              echo "| DockerHub image | Not configured; \`DOCKERHUB_ORG\` is empty. |"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
  test-image:
    name: test-image (${{ matrix.test_profile }})
    needs: build-image
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - test_profile: "CVMFS enabled, sudo disabled"
            cvmfs_disable: "false"
            grant_sudo: "no"
            needs_cvmfs: true
          - test_profile: "CVMFS enabled, sudo enabled"
            cvmfs_disable: "false"
            grant_sudo: "yes"
            needs_cvmfs: true
          - test_profile: "CVMFS disabled, sudo disabled"
            cvmfs_disable: "true"
            grant_sudo: "no"
            needs_cvmfs: false
          - test_profile: "CVMFS disabled, sudo enabled"
            cvmfs_disable: "true"
            grant_sudo: "yes"
            needs_cvmfs: false
          # HPC Apptainer simulation: no --privileged, no --user=root, no sudo,
          # a non-jovyan user (sciget/5000/5000) whose HOME is bind-mounted over
          # /home/jovyan, and APPTAINER_CONTAINER=1 so is_apptainer_runtime()
          # branches activate. Guards against HPC-only regressions that would
          # otherwise only surface on Sherlock et al.
          - test_profile: "HPC Apptainer simulation"
            cvmfs_disable: "true"
            grant_sudo: "no"
            needs_cvmfs: false
            hpc_mode: true
    steps:
      - name: Set environment variables
        run: |
          IMAGENAME="neurodesktop-dev"
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY/$IMAGENAME
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
      - name: Free up build space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift /usr/lib/android-sdk
          sudo docker image prune --all --force
          sudo docker builder prune --force
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.ref }}
      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull container image
        run: docker pull $IMAGEID:latest
      - name: Initialize CVMFS
        if: matrix.needs_cvmfs
        uses: cvmfs-contrib/github-action-cvmfs@v3
      - name: Configure Neurodesk CVMFS
        if: matrix.needs_cvmfs
        run: |
          sudo mkdir -p /etc/cvmfs/keys/ardc.edu.au
          sudo cp config/cvmfs/neurodesk.ardc.edu.au.pub /etc/cvmfs/keys/ardc.edu.au/neurodesk.ardc.edu.au.pub
          sudo cp config/cvmfs/neurodesk.ardc.edu.au.conf.cdn.america /etc/cvmfs/config.d/neurodesk.ardc.edu.au.conf
          sudo cp config/cvmfs/default.local /etc/cvmfs/default.local
          sudo cvmfs_config setup
          sudo ls /cvmfs/neurodesk.ardc.edu.au
      - name: Test container (CVMFS=${{ matrix.cvmfs_disable == 'false' && 'on' || 'off' }}, SUDO=${{ matrix.grant_sudo }})
        if: ${{ ! matrix.hpc_mode }}
        run: |
          CVMFS_MOUNT=""
          if [ "${{ matrix.needs_cvmfs }}" = "true" ]; then
            CVMFS_MOUNT="-v /cvmfs:/cvmfs:shared"
          fi
          docker rm -f neurodesktop-test 2>/dev/null || true
          docker run -d --shm-size=1gb --privileged --user=root \
            --name neurodesktop-test \
            $CVMFS_MOUNT \
            -e CVMFS_DISABLE=${{ matrix.cvmfs_disable }} \
            -e GRANT_SUDO=${{ matrix.grant_sudo }} \
            -e NEURODESKTOP_CVMFS_STARTUP_MODE=eager \
            -e NB_UID="$(id -u)" -e NB_GID="$(id -g)" \
            $IMAGEID:latest
          echo "Waiting for container startup..."
          for i in $(seq 1 60); do
            code=$(docker exec neurodesktop-test curl -so /dev/null -w '%{http_code}' \
                     --max-time 2 http://localhost:8888/api/status 2>/dev/null || echo 000)
            if echo "$code" | grep -Eq '^[0-9]{3}$' && [ "$code" != "000" ]; then
              echo "Container ready after ~$((i*2))s (HTTP ${code})"
              break
            fi
            sleep 2
          done
          docker exec -u jovyan neurodesktop-test pytest /opt/tests/ -v
          docker rm -f neurodesktop-test

      - name: Test container (HPC Apptainer simulation)
        if: ${{ matrix.hpc_mode }}
        run: |
          # Mirror the `hpctest` mode of build_and_run.sh: non-root, non-jovyan
          # user with a synthetic /etc/passwd + /etc/group bind-mount, HOME on a
          # host-owned tempdir over /home/jovyan, APPTAINER_CONTAINER=1.
          HPC_USER=sciget
          HPC_UID=5000
          HPC_GID=5000
          HPC_HOME_DIR="$(mktemp -d)"
          HPC_PASSWD_FILE="$(mktemp)"
          HPC_GROUP_FILE="$(mktemp)"

          cat > "$HPC_PASSWD_FILE" <<EOF
          root:x:0:0:root:/root:/bin/bash
          jovyan:x:1000:100:jovyan:/home/jovyan:/bin/bash
          ${HPC_USER}:x:${HPC_UID}:${HPC_GID}:${HPC_USER} (HPC simulated):/home/jovyan:/bin/bash
          nobody:x:65534:65534:nobody:/:/usr/sbin/nologin
          EOF
          cat > "$HPC_GROUP_FILE" <<EOF
          root:x:0:
          users:x:100:jovyan,${HPC_USER}
          ${HPC_USER}:x:${HPC_GID}:
          nogroup:x:65534:
          EOF
          chmod 0777 "$HPC_HOME_DIR"
          chmod 0644 "$HPC_PASSWD_FILE" "$HPC_GROUP_FILE"

          docker rm -f neurodesktop-test 2>/dev/null || true
          docker run -d --shm-size=1gb \
            --user "${HPC_UID}:${HPC_GID}" \
            --name neurodesktop-test \
            -v "${HPC_HOME_DIR}:/home/jovyan" \
            -v "${HPC_PASSWD_FILE}:/etc/passwd:ro" \
            -v "${HPC_GROUP_FILE}:/etc/group:ro" \
            -e CVMFS_DISABLE=true \
            -e NB_USER=${HPC_USER} \
            -e NB_UID=${HPC_UID} \
            -e NB_GID=${HPC_GID} \
            -e HOME=/home/jovyan \
            -e USER=${HPC_USER} \
            -e LOGNAME=${HPC_USER} \
            -e APPTAINER_CONTAINER=1 \
            -e APPTAINER_NAME=neurodesktop-test-hpc \
            -e NEURODESKTOP_CVMFS_STARTUP_MODE=lazy \
            -e NEURODESKTOP_SLURM_ENABLE=0 \
            -e NEURODESKTOP_SLURM_STARTUP_MODE=eager \
            $IMAGEID:latest
          echo "Waiting for container startup..."
          ready=0
          for i in $(seq 1 90); do
            if ! docker inspect -f '{{.State.Running}}' neurodesktop-test 2>/dev/null | grep -q true; then
              echo "::error::Container exited during startup (HPC mode)."
              docker logs --tail 120 neurodesktop-test || true
              exit 1
            fi
            code=$(docker exec neurodesktop-test curl -so /dev/null -w '%{http_code}' \
                     --max-time 2 http://localhost:8888/api/status 2>/dev/null || echo 000)
            if echo "$code" | grep -Eq '^[0-9]{3}$' && [ "$code" != "000" ]; then
              echo "Container ready after ~$((i*2))s (HTTP ${code})"
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::Container did not reach /api/status in 180s (HPC mode)."
            docker logs --tail 120 neurodesktop-test || true
            exit 1
          fi
          # Exec as the current container user (no -u jovyan: we are sciget here).
          docker exec neurodesktop-test pytest /opt/tests/ -v
          test_rc=$?
          docker rm -f neurodesktop-test
          # The container populated $HPC_HOME_DIR as UID 5000; the runner
          # cannot `rm` those files directly. Use the already-pulled image
          # as root to chown the tree back to the runner first.
          docker run --rm --user 0:0 --entrypoint chown \
            -v "$HPC_HOME_DIR":/cleanup "$IMAGEID:latest" \
            -R "$(id -u):$(id -g)" /cleanup >/dev/null 2>&1 || true
          rm -rf "$HPC_HOME_DIR" "$HPC_PASSWD_FILE" "$HPC_GROUP_FILE"
          exit $test_rc
  scan-image:
    needs: build-image
    runs-on: ubuntu-22.04
    steps:
      - name: Set environment variables
        run: |
          IMAGENAME="neurodesktop-dev"
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY/$IMAGENAME
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
      - name: Free up build space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift /usr/lib/android-sdk
          sudo docker image prune --all --force
          sudo docker builder prune --force
      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull container image
        run: docker pull $IMAGEID:latest
      - name: Scan container image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGEID }}:latest
          format: table
          exit-code: "1"
          severity: CRITICAL
          timeout: 25m0s
          skip-files: /opt/rclone-v1.60.1-linux-amd64/README.txt,/opt/rclone-v1.60.1-linux-amd64/README.html,/opt/rclone-v1.60.1-linux-amd64/rclone.1,/opt/code-server/lib/vscode/package.json,/opt/code-server/lib/vscode/extensions/handlebars/package.json
