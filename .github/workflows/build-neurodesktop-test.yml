name: Build neurodesktop-test

# Scheduled production builds at 17:00 UTC every day.
# Build manually from here: https://github.com/NeuroDesk/neurodesktop/actions/workflows/build-neurodesktop.yml

# DockerHub: https://hub.docker.com/r/vnmd/neurodesktop
# Github Packages: https://github.com/NeuroDesk/neurodesktop/pkgs/container/neurodesktop%2Fneurodesktop

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force push?"
        type: boolean
        required: true
        default: false
  schedule:
    - cron: "0 17 * * *"

env:
  DOCKERHUB_ORG: ${{ vars.DOCKERHUB_ORG }}
  # Opt the lone Node 20 holdout (JasonEtco/create-an-issue, no Node 24
  # release as of 2026-05) into Node 24 to silence deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Set only for self-hosted runners to optimize build performance
  # MAKEFLAGS: "-j4"
  # NINJA_STATUS: "[%f/%t] "
jobs:
  build-image:
    runs-on: ${{ matrix.platform.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: amd64
            docker_platform: linux/amd64
            tag: amd64
            runs_on: neurodesk-syd-arcrunner-neurodesktop
          # arm64 builds NATIVELY on a Blacksmith arm runner (no QEMU).
          - arch: arm64
            docker_platform: linux/arm64
            tag: arm64
            runs_on: blacksmith-8vcpu-ubuntu-2404-arm
    steps:
      - name: Fetch github api rate limit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GITHUB_RATE_REMAINING=$(curl -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" https://api.github.com/rate_limit | jq '.rate.remaining')
          echo "GITHUB_RATE_REMAINING=${GITHUB_RATE_REMAINING}"
          case "$GITHUB_RATE_REMAINING" in
            ''|null|0)
              echo "::error::GitHub API rate limit probe returned '${GITHUB_RATE_REMAINING:-<empty>}'. Failing job to avoid running with unset IMAGEID/BUILDDATE."
              exit 1
              ;;
          esac
          echo "GITHUB_RATE_REMAINING=$GITHUB_RATE_REMAINING" >> $GITHUB_ENV
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
      - name: Set environment variables
        run: |
          IMAGENAME="neurodesktop-test"
          BUILDDATE=`date +%Y-%m-%d`
          # GHCR path = owner + image name (e.g. ghcr.io/neurodesk/neurodesktop-test),
          # matching the clean Quay/DockerHub style. Previously this used
          # $GITHUB_REPOSITORY (org/repo), which doubled the name to
          # ghcr.io/neurodesk/neurodesktop/neurodesktop-test.
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY_OWNER/$IMAGENAME
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')

          echo "BUILDDATE=$BUILDDATE"
          echo "IMAGEID=$IMAGEID"
          echo "IMAGENAME=$IMAGENAME"

          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_ENV
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_ENV
      # No `Set up QEMU` step — amd64 builds natively on the x86 ARC pool and
      # arm64 builds natively on a Blacksmith arm runner. Nothing is emulated.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        # this is for testing the arc runners.
        with:
          driver-opts: |
            network=host
        # commenting out for now to test arc runners vs github runners
      - name: Login to GHCR
        uses: ./.github/actions/docker-login-retry
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_ORG != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push arch image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform.docker_platform }}
          provenance: false
          no-cache: true
          push: true
          tags: ${{ env.IMAGEID }}:${{ matrix.platform.tag }}
      # Telemetry — captures arc-base resource peak after the build step.
      # Goal: empirically size CPU / memory / docker-lib PVC / work PVC
      # for a future dedicated arc-neurodesktop pool. `if: always()` so
      # disk-pressure or OOM failures still emit the data we want to see.
      - name: Capture arc-base resource peak (sizing telemetry)
        if: always()
        run: |
          set +e

          echo "::group::Host / arch / kernel"
          uname -a
          nproc
          grep -E "^(model name|cpu MHz|cpu cores)" /proc/cpuinfo | sort -u
          echo "::endgroup::"

          echo "::group::Memory snapshot (free -h, /proc/meminfo)"
          free -h
          echo "---"
          head -20 /proc/meminfo
          echo "::endgroup::"

          # Kernel-maintained peak for the runner container's cgroup.
          # memory.peak is the high-water-mark since the pod started — this
          # is THE number for sizing the pod's memory request/limit.
          # io.stat tells us if we hit storage I/O ceilings during build.
          # cpu.stat throttled_time > 0 means we were CPU-capped.
          echo "::group::Runner cgroup peak (memory / cpu / io)"
          echo "--- cgroup tree (v2 root, expect memory.peak etc. present) ---"
          ls /sys/fs/cgroup/ 2>&1 | head -20
          echo
          for f in memory.peak memory.current memory.max memory.events memory.events.local memory.swap.peak memory.swap.current cpu.stat cpu.max io.stat io.pressure cpu.pressure memory.pressure; do
            if [ -r /sys/fs/cgroup/$f ]; then
              echo "--- $f ---"
              cat /sys/fs/cgroup/$f 2>&1
              echo
            fi
          done
          # Fallback for cgroup v1 (just in case)
          for f in memory/memory.max_usage_in_bytes memory/memory.limit_in_bytes cpuacct/cpuacct.usage; do
            if [ -r /sys/fs/cgroup/$f ]; then
              echo "--- (v1 fallback) $f ---"
              cat /sys/fs/cgroup/$f 2>&1
            fi
          done
          echo "::endgroup::"

          echo "::group::Filesystem from runner (df -h)"
          df -h
          echo "::endgroup::"

          echo "::group::Work PVC usage"
          du -sh /home/runner/_work 2>/dev/null
          du -sh /home/runner/_work/* 2>/dev/null | sort -h
          echo "::endgroup::"

          echo "::group::Docker daemon view (docker system df -v)"
          docker system df -v 2>&1
          echo "::endgroup::"

          echo "::group::Docker info (subset)"
          docker info 2>&1 | grep -E "(Server Version|Storage Driver|Backing Filesystem|Docker Root|CPUs|Total Memory|Operating System|Kernel|Cgroup)" || true
          echo "::endgroup::"

          # The docker daemon runs inside its OWN container (DinD sidecar) with
          # its OWN cgroup, separate from the runner's. We can't read its cgroup
          # files directly, but we CAN peek at /var/lib/docker via a privileged
          # container the daemon spawns — that gives us actual PVC fill.
          echo "::group::docker-lib PVC fill (privileged peek into DinD)"
          docker run --rm -v /var/lib/docker:/host-docker:ro alpine:3.20 sh -c '
            echo "--- df of /var/lib/docker (the docker-lib PVC) ---"
            df -h /host-docker
            echo "--- du of top-level subdirs ---"
            du -sh /host-docker/* 2>/dev/null | sort -h
          ' 2>&1
          echo "::endgroup::"

          echo "::group::Buildkit cache (docker buildx du)"
          docker buildx du 2>&1 | head -60 || true
          echo "::endgroup::"

          # Live snapshot — only catches containers still running. Builder
          # may have been torn down already, but worth a look.
          echo "::group::Live docker stats snapshot"
          docker stats --no-stream 2>&1 | head -20 || true
          echo "::endgroup::"

          # Bytes in/out since pod start. Useful for: was the registry push
          # bandwidth-bound? Compare bytes-out on eth0 to push duration.
          echo "::group::Network bytes since pod start (/proc/net/dev)"
          cat /proc/net/dev
          echo "::endgroup::"
      - name: Report job failure
        if: always() && failure()
        uses: ./.github/actions/report-job-failure
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          details: ${{ matrix.platform.arch || matrix.arch || matrix.cvmfs-servers || '' }}

  merge-manifests:
    needs: build-image
    runs-on: neurodesk-syd-arcrunner-neurodesktop
    steps:
      - name: Set environment variables
        run: |
          IMAGENAME="neurodesktop-test"
          BUILDDATE=`date +%Y-%m-%d`
          # GHCR path = owner + image name (e.g. ghcr.io/neurodesk/neurodesktop-test),
          # matching the clean Quay/DockerHub style. Previously this used
          # $GITHUB_REPOSITORY (org/repo), which doubled the name to
          # ghcr.io/neurodesk/neurodesktop/neurodesktop-test.
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY_OWNER/$IMAGENAME
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')

          PUSH_IMAGES="${IMAGEID}"
          if [ ! -z "${DOCKERHUB_ORG}" ]; then
            PUSH_IMAGES="${PUSH_IMAGES}, ${DOCKERHUB_ORG}/${IMAGENAME}"
          fi

          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_ENV
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_ENV
          echo "PUSH_IMAGES=$PUSH_IMAGES" >> $GITHUB_ENV
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to GHCR
        uses: ./.github/actions/docker-login-retry
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_ORG != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      # TRIAL: also publish to Quay. Additive — does NOT drop GHCR or DockerHub.
      # (Dropping DockerHub is a separate decision pending manager sign-off.)
      - name: Login to Quay
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}
      - name: Create and push multi-arch manifest to GHCR
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGEID }}:${{ env.BUILDDATE }} \
            -t ${{ env.IMAGEID }}:latest \
            ${{ env.IMAGEID }}:amd64 \
            ${{ env.IMAGEID }}:arm64
      - name: Install crane
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin crane
          crane version
      - name: Copy multi-arch manifest to DockerHub
        if: ${{ env.DOCKERHUB_ORG != '' }}
        run: |
          # Copy the already-assembled multi-arch manifest from GHCR to DockerHub
          # using crane, which uses a different blob upload path than
          # `docker buildx imagetools create` and avoids the 400 Bad Request
          # error we were seeing from DockerHub's registry on large blobs.
          crane copy \
            ${{ env.IMAGEID }}:${{ env.BUILDDATE }} \
            ${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}
          crane copy \
            ${{ env.IMAGEID }}:latest \
            ${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:latest
      - name: Copy multi-arch manifest to Quay (trial)
        run: |
          # Mirror the merged multi-arch index from GHCR to Quay (same crane
          # path as DockerHub above). Additive trial — independent of the
          # GHCR / DockerHub publishes.
          crane copy \
            ${{ env.IMAGEID }}:${{ env.BUILDDATE }} \
            quay.io/neurodesk/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}
          crane copy \
            ${{ env.IMAGEID }}:latest \
            quay.io/neurodesk/${{ env.IMAGENAME }}:latest
      - name: Write image publish summary
        run: |
          if [ "${{ env.DOCKERHUB_ORG }}" = "" ]; then
            RESULT="Built and pushed to GHCR + Quay."
          else
            RESULT="Built and pushed to GHCR, DockerHub, and Quay."
          fi

          {
            echo "## Image publish summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Result | ${RESULT} |"
            echo "| Version | \`${{ env.BUILDDATE }}\` |"
            echo "| Source commit | \`${GITHUB_SHA}\` |"
            echo "| GHCR image | \`${{ env.IMAGEID }}:${{ env.BUILDDATE }}\`, \`${{ env.IMAGEID }}:latest\` |"
            echo "| Quay image | \`quay.io/neurodesk/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}\`, \`quay.io/neurodesk/${{ env.IMAGENAME }}:latest\` |"
            if [ "${{ env.DOCKERHUB_ORG }}" != "" ]; then
              echo "| DockerHub image | \`${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}\`, \`${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:latest\` |"
            else
              echo "| DockerHub image | Not configured; \`DOCKERHUB_ORG\` is empty. |"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Checkout repository for failure issue template
        if: always() && failure()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
      - name: Report job failure
        if: always() && failure()
        uses: ./.github/actions/report-job-failure
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          details: ${{ matrix.platform.arch || matrix.arch || matrix.cvmfs-servers || '' }}

  test-image:
    name: test-image (${{ matrix.arch }} / ${{ matrix.profile.test_profile }})
    needs: build-image
    # arm64 tests RUN the container, so they need a native arm64 runner
    # (Blacksmith); amd64 stays on the GitHub-hosted runner.
    runs-on: ${{ matrix.arch == 'arm64' && 'blacksmith-8vcpu-ubuntu-2404-arm' || 'ubuntu-22.04' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        profile:
          - test_profile: "CVMFS enabled, sudo disabled"
            cvmfs_disable: "false"
            grant_sudo: "no"
            needs_cvmfs: true
          - test_profile: "CVMFS enabled, sudo enabled"
            cvmfs_disable: "false"
            grant_sudo: "yes"
            needs_cvmfs: true
          - test_profile: "CVMFS disabled, sudo disabled"
            cvmfs_disable: "true"
            grant_sudo: "no"
            needs_cvmfs: false
          - test_profile: "CVMFS disabled, sudo enabled"
            cvmfs_disable: "true"
            grant_sudo: "yes"
            needs_cvmfs: false
          # HPC Apptainer simulation: no --privileged, no --user=root, no sudo,
          # a non-jovyan user (sciget/5000/5000) whose HOME is bind-mounted over
          # /home/jovyan, and APPTAINER_CONTAINER=1 so is_apptainer_runtime()
          # branches activate. Guards against HPC-only regressions that would
          # otherwise only surface on Sherlock et al.
          - test_profile: "HPC Apptainer simulation"
            cvmfs_disable: "true"
            grant_sudo: "no"
            needs_cvmfs: false
            hpc_mode: true
        exclude:
          # arm64 + CVMFS deferred: the arm64 CVMFS tool library is mid-port
          # upstream and the arch-aware CVMFS routing (variant symlinks) isn't
          # wired yet, so /cvmfs/neurodesk.ardc.edu.au doesn't mount on the arm64
          # runner. Re-enable these 2 combos once arm64 CVMFS content + routing
          # land. amd64 keeps full CVMFS coverage.
          - arch: arm64
            profile:
              test_profile: "CVMFS enabled, sudo disabled"
              cvmfs_disable: "false"
              grant_sudo: "no"
              needs_cvmfs: true
          - arch: arm64
            profile:
              test_profile: "CVMFS enabled, sudo enabled"
              cvmfs_disable: "false"
              grant_sudo: "yes"
              needs_cvmfs: true
    steps:
      - name: Set environment variables
        run: |
          IMAGENAME="neurodesktop-test"
          # GHCR path = owner + image name (e.g. ghcr.io/neurodesk/neurodesktop-test),
          # matching the clean Quay/DockerHub style. Previously this used
          # $GITHUB_REPOSITORY (org/repo), which doubled the name to
          # ghcr.io/neurodesk/neurodesktop/neurodesktop-test.
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY_OWNER/$IMAGENAME
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
          # Pull the per-arch tag matching this job's arch.
          echo "IMAGE_REF=$IMAGEID:${{ matrix.arch }}" >> $GITHUB_ENV
      - name: Free up build space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift /usr/lib/android-sdk || true
          sudo docker image prune --all --force || true
          sudo docker builder prune --force || true
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
      - name: Login to GHCR
        uses: ./.github/actions/docker-login-retry
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull container image
        run: docker pull "$IMAGE_REF"
      - name: Initialize CVMFS
        if: matrix.profile.needs_cvmfs
        uses: cvmfs-contrib/github-action-cvmfs@v3
      - name: Configure Neurodesk CVMFS
        if: matrix.profile.needs_cvmfs
        run: |
          sudo mkdir -p /etc/cvmfs/keys/ardc.edu.au
          sudo cp config/cvmfs/neurodesk.ardc.edu.au.pub /etc/cvmfs/keys/ardc.edu.au/neurodesk.ardc.edu.au.pub
          sudo cp config/cvmfs/neurodesk.ardc.edu.au.conf.cdn.america /etc/cvmfs/config.d/neurodesk.ardc.edu.au.conf
          sudo cp config/cvmfs/default.local /etc/cvmfs/default.local
          sudo cvmfs_config setup
          sudo ls /cvmfs/neurodesk.ardc.edu.au
      - name: Test container (CVMFS=${{ matrix.profile.cvmfs_disable == 'false' && 'on' || 'off' }}, SUDO=${{ matrix.profile.grant_sudo }})
        if: ${{ ! matrix.profile.hpc_mode }}
        run: |
          CVMFS_MOUNT=""
          if [ "${{ matrix.profile.needs_cvmfs }}" = "true" ]; then
            CVMFS_MOUNT="-v /cvmfs:/cvmfs:shared"
          fi
          docker rm -f neurodesktop-test 2>/dev/null || true
          docker run -d --shm-size=1gb --privileged --user=root \
            --name neurodesktop-test \
            $CVMFS_MOUNT \
            -e CVMFS_DISABLE=${{ matrix.profile.cvmfs_disable }} \
            -e GRANT_SUDO=${{ matrix.profile.grant_sudo }} \
            -e NEURODESKTOP_CVMFS_STARTUP_MODE=eager \
            -e NB_UID="$(id -u)" -e NB_GID="$(id -g)" \
            "$IMAGE_REF"
          echo "Waiting for container startup..."
          for i in $(seq 1 60); do
            code=$(docker exec neurodesktop-test curl -so /dev/null -w '%{http_code}' \
                     --max-time 2 http://localhost:8888/api/status 2>/dev/null || echo 000)
            if echo "$code" | grep -Eq '^[0-9]{3}$' && [ "$code" != "000" ]; then
              echo "Container ready after ~$((i*2))s (HTTP ${code})"
              break
            fi
            sleep 2
          done
          docker exec -e NEURODESKTOP_TEST_ALLOW_GLOBAL_DESKTOP_SERVICES=1 \
            -u jovyan neurodesktop-test pytest /opt/tests/ -v
          docker rm -f neurodesktop-test

      - name: Test container (HPC Apptainer simulation)
        if: ${{ matrix.profile.hpc_mode }}
        run: |
          # Mirror the `hpctest` mode of build_and_run.sh: non-root, non-jovyan
          # user with a synthetic /etc/passwd + /etc/group bind-mount, HOME on a
          # host-owned tempdir over /home/jovyan, APPTAINER_CONTAINER=1.
          HPC_USER=sciget
          HPC_UID=5000
          HPC_GID=5000
          HPC_HOME_DIR="$(mktemp -d)"
          HPC_PASSWD_FILE="$(mktemp)"
          HPC_GROUP_FILE="$(mktemp)"

          cat > "$HPC_PASSWD_FILE" <<EOF
          root:x:0:0:root:/root:/bin/bash
          jovyan:x:1000:100:jovyan:/home/jovyan:/bin/bash
          ${HPC_USER}:x:${HPC_UID}:${HPC_GID}:${HPC_USER} (HPC simulated):/home/jovyan:/bin/bash
          nobody:x:65534:65534:nobody:/:/usr/sbin/nologin
          EOF
          cat > "$HPC_GROUP_FILE" <<EOF
          root:x:0:
          users:x:100:jovyan,${HPC_USER}
          ${HPC_USER}:x:${HPC_GID}:
          nogroup:x:65534:
          EOF
          chmod 0777 "$HPC_HOME_DIR"
          chmod 0644 "$HPC_PASSWD_FILE" "$HPC_GROUP_FILE"

          docker rm -f neurodesktop-test 2>/dev/null || true
          docker run -d --shm-size=1gb \
            --user "${HPC_UID}:${HPC_GID}" \
            --name neurodesktop-test \
            -v "${HPC_HOME_DIR}:/home/jovyan" \
            -v "${HPC_PASSWD_FILE}:/etc/passwd:ro" \
            -v "${HPC_GROUP_FILE}:/etc/group:ro" \
            -e CVMFS_DISABLE=true \
            -e NB_USER=${HPC_USER} \
            -e NB_UID=${HPC_UID} \
            -e NB_GID=${HPC_GID} \
            -e HOME=/home/jovyan \
            -e USER=${HPC_USER} \
            -e LOGNAME=${HPC_USER} \
            -e APPTAINER_CONTAINER=1 \
            -e APPTAINER_NAME=neurodesktop-test-hpc \
            -e NEURODESKTOP_CVMFS_STARTUP_MODE=lazy \
            -e NEURODESKTOP_SLURM_ENABLE=0 \
            -e NEURODESKTOP_SLURM_STARTUP_MODE=eager \
            "$IMAGE_REF"
          echo "Waiting for container startup..."
          ready=0
          for i in $(seq 1 90); do
            if ! docker inspect -f '{{.State.Running}}' neurodesktop-test 2>/dev/null | grep -q true; then
              echo "::error::Container exited during startup (HPC mode)."
              docker logs --tail 120 neurodesktop-test || true
              exit 1
            fi
            code=$(docker exec neurodesktop-test curl -so /dev/null -w '%{http_code}' \
                     --max-time 2 http://localhost:8888/api/status 2>/dev/null || echo 000)
            if echo "$code" | grep -Eq '^[0-9]{3}$' && [ "$code" != "000" ]; then
              echo "Container ready after ~$((i*2))s (HTTP ${code})"
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::Container did not reach /api/status in 180s (HPC mode)."
            docker logs --tail 120 neurodesktop-test || true
            exit 1
          fi
          # Exec as the current container user (no -u jovyan: we are sciget here).
          docker exec -e NEURODESKTOP_TEST_ALLOW_GLOBAL_DESKTOP_SERVICES=1 \
            neurodesktop-test pytest /opt/tests/ -v
          test_rc=$?
          docker rm -f neurodesktop-test
          # The container populated $HPC_HOME_DIR as UID 5000; the runner
          # (UID 1001) cannot `rm` those files directly. Use the already-
          # pulled image as root to chown the tree back to the runner first.
          docker run --rm --user 0:0 --entrypoint chown \
            -v "$HPC_HOME_DIR":/cleanup "$IMAGE_REF" \
            -R "$(id -u):$(id -g)" /cleanup >/dev/null 2>&1 || true
          rm -rf "$HPC_HOME_DIR" "$HPC_PASSWD_FILE" "$HPC_GROUP_FILE"
          exit $test_rc

  scan-image:
    name: scan-image (${{ matrix.arch }})
    needs: build-image
    # Trivy scans image layers (it does not RUN the container), so a per-arch
    # arm64 image can be scanned from an x86 runner.
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Set environment variables
        run: |
          IMAGENAME="neurodesktop-test"
          # GHCR path = owner + image name (e.g. ghcr.io/neurodesk/neurodesktop-test),
          # matching the clean Quay/DockerHub style. Previously this used
          # $GITHUB_REPOSITORY (org/repo), which doubled the name to
          # ghcr.io/neurodesk/neurodesktop/neurodesktop-test.
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY_OWNER/$IMAGENAME
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
      - name: Free up build space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift /usr/lib/android-sdk
          sudo docker image prune --all --force
          sudo docker builder prune --force
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
      - name: Login to GHCR
        uses: ./.github/actions/docker-login-retry
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull container image
        run: docker pull $IMAGEID:${{ matrix.arch }}
      - name: Container image scan (${{ matrix.arch }})
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGEID }}:${{ matrix.arch }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          trivyignores: ./.trivyignore.yaml
          timeout: 25m0s
          skip-files: /opt/rclone-v1.60.1-linux-amd64/README.txt,/opt/rclone-v1.60.1-linux-amd64/README.html,/opt/rclone-v1.60.1-linux-amd64/rclone.1,/opt/code-server/lib/vscode/package.json,/opt/code-server/lib/vscode/extensions/handlebars/package.json
      - name: Checkout repository for failure issue template
        if: always() && failure()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
      - name: Report job failure
        if: always() && failure()
        uses: ./.github/actions/report-job-failure
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          details: ${{ matrix.platform.arch || matrix.arch || matrix.cvmfs-servers || '' }}
