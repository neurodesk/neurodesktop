name: Test cvmfs

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 17 * * *'
    
env:
  DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_ORG }}

jobs:
  test_cvmfs_1_2_3:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: check if cvmfs setup with multiple entries works
      run: /bin/bash .github/workflows/test_cvmfs_1_2_3.sh
    - name: Report job failure
      if: always() && failure()
      uses: ./.github/actions/report-job-failure
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        details: ${{ matrix.platform.arch || matrix.arch || matrix.cvmfs-servers || '' }}
  test_cvmfs:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        cvmfs-servers: ["s1fnal-cvmfs.openhtc.io:8080",
                        "s1bnl-cvmfs.openhtc.io",
                        "s1osggoc-cvmfs.openhtc.io:8080",
                        "s1brisbane-cvmfs.openhtc.io",
                        "s1sydney-cvmfs.openhtc.io",
                        "s1melbourne-cvmfs.openhtc.io",
                        "s1perth-cvmfs.openhtc.io",
                        "cvmfs-frankfurt.neurodesk.org",
                        "cvmfs-jetstream.neurodesk.org",
                        "s1ral-cvmfs.openhtc.io",
                        "s1nikhef-cvmfs.openhtc.io",
                        "cvmfs-stratum-one.ihep.ac.cn",
                        "cvmfs-s1.hpc.swin.edu.au",
                        "s1sampa-cvmfs.openhtc.io:8080",
                        "stratum0.neurodesk.cloud.edu.au",
                        "cvmfs-geoproximity.neurodesk.org"]
                        # not yet active:
                          # "cvmfs-s1.hpc.swin.edu.au",
                          # "cvmfs-stratum-one.ihep.ac.cn",
                        # currently down:
                          # "s1sampa-cvmfs.openhtc.io:8080",
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: check if ${{ matrix.cvmfs-servers }} is online and up-to-date
      run: /bin/bash .github/workflows/test_cvmfs.sh  ${{ matrix.cvmfs-servers }}
    - name: Report job failure
      if: always() && failure()
      uses: ./.github/actions/report-job-failure
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        details: ${{ matrix.platform.arch || matrix.arch || matrix.cvmfs-servers || '' }}
